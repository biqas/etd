<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ETD Bildmarke</title>
  <desc id="desc">Glühbirne (Elektrotechnik) und Schneeflocke (Kälte-/Klimatechnik).</desc>
  <g aria-hidden="true">

    <!-- ============ BULB (left) — etwas schlanker ============ -->
    <g transform="translate(28 41) scale(0.42)">
      <g fill="#710B0E">
        <!-- Bulb body: schmaler/eleganter als zuvor -->
        <path d="M92 12 C49 12 14 50 14 104 C14 134 28 162 50 180 L50 211 H134 V180 C156 162 170 134 170 104 C170 50 135 12 92 12 Z"/>
        <!-- Schraubsockel-Streifen (schmaler) -->
        <rect x="50" y="222" width="84" height="10"/>
        <rect x="50" y="199" width="84" height="11"/>
        <rect x="50" y="176" width="84" height="11"/>
        <!-- Bodenkontakt -->
        <path d="M65 234 H119 V239 C119 239 113 240 92 240 C71 240 65 239 65 239 Z"/>
      </g>
      <!-- Weißer Glühdraht: M-Form + Stem -->
      <g fill="none" stroke="#FFFFFF" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M42 105 L68 78 L92 104 L116 78 L142 105" stroke-width="15"/>
        <path d="M92 104 L92 168" stroke-width="17"/>
      </g>
    </g>

    <!-- ============ SNOWFLAKE (right) — Lucide-Style aus der Klima-Karte ============ -->
    <g transform="translate(228 90) scale(5)" stroke="#075F9F" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <g transform="translate(-12 -12)">
        <path d="M2 12h20"/>
        <path d="M12 2v20"/>
        <path d="m20 16-4-4 4-4"/>
        <path d="m4 8 4 4-4 4"/>
        <path d="m16 4-4 4-4-4"/>
        <path d="m8 20 4-4 4 4"/>
      </g>
    </g>

  </g>
</svg>
