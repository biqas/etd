---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etd-web
  labels:
    app: etd-web
spec:
  minReadySeconds: 30
  replicas: 1
  selector:
    matchLabels:
      app: etd-web
  strategy:
    # Recreate (not RollingUpdate) because the PersistentVolumeClaim for
    # /var/keys is ReadWriteOnce and can only be mounted by one pod at a time.
    type: Recreate
  template:
    metadata:
      labels:
        app: etd-web
    spec:
      # APP_UID=1654 in the .NET chiseled image. Without fsGroup the mounted PVC
      # at /var/keys is root-owned, so DataProtection can't write key XML and any
      # antiforgery-protected POST 500s.
      securityContext:
        fsGroup: 1654
      containers:
      - name: etd-web
        image: ghcr.io/biqas/etd/etd-web:latest
        # Always pull because we re-publish the floating ":latest" tag from local builds.
        # Without this, the node caches the previous digest and never sees new code.
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: etd-web-env
        env:
        - name: Smtp__Host
          valueFrom:
            secretKeyRef:
              name: etd-smtp
              key: host
              optional: true
        - name: Smtp__Port
          valueFrom:
            secretKeyRef:
              name: etd-smtp
              key: port
              optional: true
        - name: Smtp__User
          valueFrom:
            secretKeyRef:
              name: etd-smtp
              key: user
              optional: true
        - name: Smtp__Pass
          valueFrom:
            secretKeyRef:
              name: etd-smtp
              key: pass
              optional: true
        - name: Smtp__UseTls
          valueFrom:
            secretKeyRef:
              name: etd-smtp
              key: use-tls
              optional: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /alive
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: dp-keys
          mountPath: /var/keys
      volumes:
      - name: dp-keys
        persistentVolumeClaim:
          claimName: etd-web-dp-keys
      terminationGracePeriodSeconds: 180
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etd-web-dp-keys
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
