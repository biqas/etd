resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: etd-web-env
  literals:
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - ASPNETCORE_URLS=http://+:8080
    - HTTP_PORTS=8080
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
